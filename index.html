<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام حساب جرعات الشرابات </title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(145deg, #eef2ff 0%, #f0f9ff 100%); padding: 20px; min-height: 100vh; color: #1e293b; }
        .container { max-width: 950px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.9rem; font-weight: 800; background: linear-gradient(120deg, #0c4a6e, #1e6f5c); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .card { background: rgba(255, 255, 255, 0.98); border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12); padding: 20px 25px; margin-bottom: 25px; border: 1px solid rgba(14,165,233,0.3); }
        .card h2 { font-size: 1.5rem; font-weight: 700; border-right: 6px solid #0ea5e9; padding-right: 16px; margin-bottom: 20px; color: #0c4a6e; }
        .custom-select-area { position: relative; margin-bottom: 20px; }
        #searchDrug { width: 100%; padding: 14px 18px; font-size: 1rem; font-family: 'Tajawal', monospace; border: 2px solid #cbd5e1; border-radius: 30px; background: white; font-weight: 500; padding-right: 45px; }
        #searchDrug:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.2); outline: none; }
        .search-icon { position: absolute; left: 18px; top: 16px; color: #0ea5e9; }
        #drugListBox { position: absolute; z-index: 1000; background: white; width: 100%; max-height: 350px; border: 2px solid #0ea5e9; border-radius: 20px; overflow-y: auto; margin-top: 5px; box-shadow: 0 15px 25px -10px rgba(0,0,0,0.2); display: none; }
        #drugListBox.show { display: block; }
        .drug-option { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #e2e8f0; font-weight: 500; }
        .drug-option:hover { background: #e0f2fe; }
        .drug-category { background: #f1f5f9; font-weight: 800; color: #0369a1; padding: 8px 15px; font-size: 0.8rem; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-field label { display: block; font-weight: 700; margin-bottom: 6px; color: #155e75; font-size: 0.85rem; }
        .input-field input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 20px; font-family: monospace; font-size: 1rem; text-align: center; }
        .btn-calc { background: linear-gradient(95deg, #0ea5e9, #06b6d4); border: none; width: 100%; padding: 14px; border-radius: 50px; font-family: 'Tajawal'; font-weight: 800; font-size: 1.2rem; color: white; cursor: pointer; }
        .result-value { background: #f0fdf4; border-radius: 30px; padding: 15px; text-align: center; border: 2px solid #22c55e; margin-bottom: 20px; }
        .dose-ml { font-size: 3rem; font-weight: 900; color: #166534; background: white; display: inline-block; padding: 5px 25px; border-radius: 60px; }
        .info-line { display: flex; justify-content: space-between; border-bottom: 1px dashed #cbd5e1; padding: 8px 0; }
        .warning-note { background: #fffbeb; border-right: 6px solid #f59e0b; padding: 12px; border-radius: 24px; margin-top: 18px; font-size: 0.85rem; font-weight: 600; color: #b45309; }
        .btn-print { background: #059669; width: 100%; padding: 12px; border-radius: 40px; border: none; font-weight: 800; color: white; margin-top: 20px; cursor: pointer; }
        footer { text-align: center; margin-top: 20px; font-weight: 700; color: #2c5f6e; }
        @media (max-width: 650px) { .row-3 { grid-template-columns: 1fr; } .dose-ml { font-size: 2rem; } }
    </style>
</head>
<body onload="clearSystem()">

<div class="container">
    <div class="header">
        <h1><i class="fas fa-prescription-bottle"></i> حاسبة جرعات الشرابات</h1>
        <p>نظام دقيق | جرعة مباشرة (مل/كجم)</p>
    </div>

    <div class="card">
        <h2><i class="fas fa-search"></i> اختيار الدواء والوزن</h2>
        <div class="custom-select-area">
            <i class="fas fa-capsules search-icon"></i>
            <input type="text" id="searchDrug" placeholder="ابحث باسم الدواء..." autocomplete="new-password">
            <div id="drugListBox"></div>
        </div>
        <div class="row-3">
            <div class="input-field"><label>العمر (سنة)</label><input type="number" id="ageY" placeholder="سنة" step="0.1" autocomplete="off"></div>
            <div class="input-field"><label>العمر (شهر)</label><input type="number" id="ageM" placeholder="شهر" step="1" autocomplete="off"></div>
            <div class="input-field"><label>الوزن (كجم)</label><input type="number" id="weight" placeholder="مثال: 12.5" step="0.1" autocomplete="off"></div>
        </div>
        <button class="btn-calc" id="calcBtn"><i class="fas fa-calculator"></i> احسب الجرعة بدقة</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-chart-line"></i> الجرعة الموصى بها</h2>
        <div class="result-value">
            <div class="dose-ml" id="finalMl">--- مل</div>
            <div id="finalMgEquivalent" style="margin-top:8px;">--- مجم لكل جرعة</div>
        </div>
        <div id="detailsContainer">
            <div class="info-line"><span>💊 الدواء:</span> <strong id="drugNameDisplay">لم يتم اختيار دواء</strong></div>
            <div class="info-line"><span>🧪 التركيز:</span> <span id="concDisplay">---</span></div>
            <div class="info-line"><span>⚕️ عدد المرات:</span> <span id="freqDisplay">---</span></div>
            <div class="info-line"><span>📌 ملاحظة العلاج:</span> <span id="noteDisplay">---</span></div>
        </div>
        <div id="warningBox" class="warning-note">
            <i class="fas fa-shield-alt"></i> <span id="warningText">🔍 يرجى اختيار الدواء وإدخال الوزن ثم الضغط على احسب</span>
        </div>
        <button id="printBtn" class="btn-print"><i class="fas fa-print"></i> طباعة ملصق الصيدلية</button>
    </div>
    <footer>الصيدلاني : مصطفى عبد الزهرة هاشم</footer>
</div>

<script>
    const drugsDatabase = [
        { name: "Amoxicillin 125mg/5ml", category: "البنسلينات", factor_ml_kg: 0.5, frequency: "3 مرات يومياً", note: "يؤخذ بدون ارتباط بالطعام.", concentration: "125 مجم / 5 مل" },
        { name: "Amoxicillin 250mg/5ml", category: "البنسلينات", factor_ml_kg: 0.25, frequency: "3 مرات يومياً", note: "يؤخذ بدون ارتباط بالطعام.", concentration: "250 مجم / 5 مل" },
        { name: "Co-amoxiclav 156mg/5ml", category: "البنسلينات", factor_ml_kg: 0.25, frequency: "3 مرات يومياً", note: "يؤخذ مع بداية الوجبة.", concentration: "156 مجم / 5 مل" },
        { name: "Co-amoxiclav 312mg/5ml", category: "البنسلينات", factor_ml_kg: 0.15, frequency: "3 مرات يومياً", note: "يؤخذ مع الطعام.", concentration: "312 مجم / 5 مل" },
        { name: "Co-amoxiclav 457mg/5ml", category: "البنسلينات", factor_ml_kg: 0.2, frequency: "مرتين يومياً", note: "مع الطعام.", concentration: "457 مجم / 5 مل" },
        { name: "Cephalexin 125mg/5ml", category: "السيفالوسبورينات", factor_ml_kg: 0.8, frequency: "مرتين يومياً", note: "مع الطعام لتقليل اضطراب المعدة.", concentration: "125 مجم / 5 مل" },
        { name: "Metronidazole 125mg/5ml", category: "أخرى", factor_ml_kg: 0.4, frequency: "3 مرات يومياً", note: "مع الطعام.", concentration: "125 مجم / 5 مل" },
        { name: "Metronidazole 200mg/5ml", category: "أخرى", factor_ml_kg: 0.25, frequency: "3 مرات يومياً", note: "مع الطعام.", concentration: "200 مجم / 5 مل" },
        { name: "Trimethoprim 50mg/5ml", category: "أخرى", factor_ml_kg: 0.2, frequency: "مرتين يومياً", note: "بدون طعام مع كأس ماء.", concentration: "50 مجم / 5 مل" },
        { name: "Salbutamol 2mg/5ml", category: "موسعات", factor_ml_kg: 0.15, frequency: "3 مرات يومياً", note: "يمكن تقليل الجرعة 0.5 مل.", concentration: "2 مجم / 5 مل" },
        { name: "Domperidone 5mg/5ml", category: "مضادات القيء", factor_ml_kg: 0.2, frequency: "3 مرات يومياً", note: "قبل الطعام بنصف ساعة.", concentration: "5 مجم / 5 مل" },
        { name: "Paracetamol 120mg/5ml", category: "مسكنات", factor_ml_kg: 0.6, frequency: "كل 6 ساعات", note: "مع الطعام.", concentration: "120 مجم / 5 مل" },
        { name: "Ibuprofen 100mg/5ml", category: "مسكنات", factor_ml_kg: 0.5, frequency: "3 مرات يومياً", note: "بعد الطعام.", concentration: "100 مجم / 5 مل" }
    ];

    let currentDrug = null;
    const searchInput = document.getElementById('searchDrug');
    const drugListDiv = document.getElementById('drugListBox');

    // تصفير النظام تماماً عند الفتح
    function clearSystem() {
        currentDrug = null;
        searchInput.value = "";
        document.getElementById('weight').value = "";
        document.getElementById('ageY').value = "";
        document.getElementById('ageM').value = "";
        document.getElementById('finalMl').innerText = "--- مل";
        document.getElementById('finalMgEquivalent').innerText = "--- مجم لكل جرعة";
        document.getElementById('drugNameDisplay').innerText = "لم يتم اختيار دواء";
        document.getElementById('concDisplay').innerText = "---";
        document.getElementById('freqDisplay').innerText = "---";
        document.getElementById('noteDisplay').innerText = "---";
        document.getElementById('warningText').innerText = "🔍 يرجى اختيار الدواء وإدخال الوزن ثم الضغط على احسب";
        buildDrugList("");
    }

    function buildDrugList(filterText = "") {
        const filtered = drugsDatabase.filter(d => d.name.toLowerCase().includes(filterText.toLowerCase()));
        const grouped = {};
        filtered.forEach(d => { if(!grouped[d.category]) grouped[d.category] = []; grouped[d.category].push(d); });
        
        drugListDiv.innerHTML = "";
        for(const [cat, items] of Object.entries(grouped)) {
            const catDiv = document.createElement("div"); 
            catDiv.className = "drug-category"; 
            catDiv.innerText = cat; 
            drugListDiv.appendChild(catDiv);
            
            items.forEach(drug => {
                const opt = document.createElement("div"); 
                opt.className = "drug-option"; 
                opt.innerText = drug.name;
                opt.onclick = () => { 
                    currentDrug = drug; 
                    searchInput.value = drug.name; 
                    drugListDiv.classList.remove("show"); 
                };
                drugListDiv.appendChild(opt);
            });
        }
        if(filtered.length === 0) {
            const noData = document.createElement("div");
            noData.className = "drug-option";
            noData.innerText = "❌ لا يوجد دواء";
            drugListDiv.appendChild(noData);
        }
    }

    searchInput.addEventListener("input", (e) => { 
        buildDrugList(e.target.value); 
        drugListDiv.classList.add("show"); 
    });

    searchInput.addEventListener("focus", () => { 
        buildDrugList(searchInput.value); 
        drugListDiv.classList.add("show"); 
    });

    document.addEventListener("click", (e) => { 
        if(!searchInput.contains(e.target) && !drugListDiv.contains(e.target)) 
            drugListDiv.classList.remove("show"); 
    });

    function calcWeightFromAge() {
        let y = parseFloat(document.getElementById('ageY').value);
        let m = parseFloat(document.getElementById('ageM').value);
        let w = document.getElementById('weight');
        if(!isNaN(y) && y > 0) { 
            w.value = (y*2)+8; 
            document.getElementById('ageM').value = ""; 
        }
        else if(!isNaN(m) && m > 0) { 
            w.value = (m+9)/2; 
            document.getElementById('ageY').value = ""; 
        }
    }
    document.getElementById('ageY').addEventListener('input', calcWeightFromAge);
    document.getElementById('ageM').addEventListener('input', calcWeightFromAge);

    function calculateDose() {
        let weight = parseFloat(document.getElementById('weight').value);
        if(!currentDrug) { alert("اختر الدواء أولاً"); return; }
        if(isNaN(weight) || weight <= 0) { alert("أدخل الوزن"); return; }
        
        let doseMl = Math.round((weight * currentDrug.factor_ml_kg) * 10) / 10;
        let concMatch = currentDrug.concentration.match(/(\d+)\s*مجم/);
        let mgPerDose = concMatch ? Math.round((doseMl * (parseFloat(concMatch[1])/5)) * 10)/10 : 0;
        
        document.getElementById('finalMl').innerText = doseMl.toFixed(1) + " مل";
        document.getElementById('finalMgEquivalent').innerText = `≈ ${mgPerDose.toFixed(1)} مجم لكل جرعة`;
        document.getElementById('drugNameDisplay').innerText = currentDrug.name;
        document.getElementById('concDisplay').innerText = currentDrug.concentration;
        document.getElementById('freqDisplay').innerText = currentDrug.frequency;
        document.getElementById('noteDisplay').innerText = currentDrug.note;
        document.getElementById('warningText').innerText = currentDrug.note;
    }
    document.getElementById('calcBtn').addEventListener('click', calculateDose);

    function printLabel() {
        if(!currentDrug) { alert("اختر الدواء أولاً"); return; }
        let weight = parseFloat(document.getElementById('weight').value);
        if(isNaN(weight)) { alert("أدخل الوزن"); return; }
        let doseMl = Math.round((weight * currentDrug.factor_ml_kg) * 10) / 10;
        
        let win = window.open('', '', 'width=450,height=450');
        win.document.write(`
            <html dir="rtl"><head><style>
                @page { size: 80mm 45mm; margin: 2mm; }
                body { font-family: 'Tajawal', sans-serif; text-align: center; }
                .drug-name { font-size: 16px; font-weight: 900; border-bottom: 2px solid #0ea5e9; display: inline-block; }
                .dose-big { font-size: 32px; font-weight: 900; color: #047857; margin: 5px 0; }
            </style></head><body onload="window.print();window.close()">
                <div class="drug-name">${currentDrug.name}</div>
                <div class="dose-big">${doseMl.toFixed(1)} مل</div>
                <div>${currentDrug.frequency}</div>
                <div style="font-size:10px; margin-top:5px;">الصيدلاني : مصطفى عبد الزهرة هاشم</div>
            </body></html>
        `);
        win.document.close();
    }
    document.getElementById('printBtn').addEventListener('click', printLabel);
</script>

</body>
</html>
